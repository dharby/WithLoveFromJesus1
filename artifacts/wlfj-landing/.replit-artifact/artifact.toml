kind = "web"
previewPath = "/"
title = "With Love from Jesus"
version = "1.0.0"
id = "artifacts/wlfj-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18839

[services.development]
run = "pnpm --filter @workspace/wlfj-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/wlfj-landing", "run", "build" ]
publicDir = "artifacts/wlfj-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18839"
BASE_PATH = "/"
