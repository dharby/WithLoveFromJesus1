    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Nunito:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    <style>
      #wlfj-loading {
        position: fixed;
        inset: 0;
        background: #faf8f5;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        gap: 16px;
      }
      #wlfj-loading svg {
        animation: wlfj-heartbeat 1.1s ease-in-out infinite;
        filter: drop-shadow(0 4px 16px rgba(249,115,22,0.4));
      }
      #wlfj-loading p {
        font-family: "Playfair Display", serif;
        font-size: 1rem;
        color: #7c1a1a;
        letter-spacing: 0.1em;
        opacity: 0.7;
      }
      @keyframes wlfj-heartbeat {
        0%, 100% { transform: scale(1); }
        20%       { transform: scale(1.22); }
        40%       { transform: scale(1); }
        60%       { transform: scale(1.12); }
        80%       { transform: scale(1); }
      }
    </style>
  </head>
  <body>
    <div id="wlfj-loading">
      <svg viewBox="0 0 24 24" width="64" height="64" fill="#f97316">
        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
      </svg>
      <p>With Love from Jesus</p>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
